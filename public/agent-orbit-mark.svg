<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="2 30 456 370" width="456" height="370">
  
  <defs>
    <radialGradient id="sphM" cx="50%" cy="46%" r="50%">
      <stop offset="0%" stop-color="#1E4060" stop-opacity="0.92"></stop>
      <stop offset="60%" stop-color="#0D1E32" stop-opacity="0.70"></stop>
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="glwM" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8FD0F2" stop-opacity="0.22"></stop>
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="tglowM" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7" result="blur"></feGaussianBlur>
      <feFlood flood-color="#8FD0F2" flood-opacity="0.95" result="col"></feFlood>
      <feComposite in="col" in2="blur" operator="in" result="shadow"></feComposite>
      <feMerge><feMergeNode in="shadow"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <circle cx="230" cy="200" r="148" fill="url(#sphM)"></circle>
  <circle cx="230" cy="200" r="110" fill="url(#glwM)" class="glow"></circle>
  <circle cx="230" cy="200" r="192" fill="none" stroke="rgba(143,208,242,0.08)" stroke-width="1" stroke-dasharray="2 6"></circle>
  <g class="r1">
    <ellipse cx="230" cy="200" rx="228" ry="66" fill="none" stroke="#8FD0F2" stroke-width="2.2"></ellipse>
    <circle cx="458" cy="200" r="6.5" fill="#C9EAFB" style="filter:drop-shadow(0 0 10px #8FD0F2)"></circle>
    <circle cx="2" cy="200" r="4.5" fill="#C9EAFB" opacity="0.75"></circle>
  </g>
  <g class="r2">
    <g transform="rotate(52 230 200)">
      <ellipse cx="230" cy="200" rx="228" ry="66" fill="none" stroke="#E07B27" stroke-width="2.2"></ellipse>
