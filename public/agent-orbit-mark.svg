    </g>
  </g>
  
  <polygon points="150,175 310,175 230,290" fill="#0B1120" stroke="#8FD0F2" stroke-width="3" filter="url(#tglowM)"></polygon>
  <polygon points="170,189 290,189 230,272" fill="#0B1120" stroke="rgba(143,208,242,0.7)" stroke-width="2"></polygon>
  <polygon points="190,203 270,203 230,254" fill="rgba(224,123,39,0.45)" stroke="#E07B27" stroke-width="2"></polygon>
