<?xml version="1.0" encoding="UTF-8"?>
<svg class="mark" viewBox="0 0 460 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Orbit compass mark">
    <defs>
      <radialGradient id="gGlow" cx="50%" cy="44%" r="50%">
        <stop offset="0%" stop-color="var(--solar)" stop-opacity="0.30"/>
        <stop offset="55%" stop-color="var(--solar)" stop-opacity="0.05"/>
        <stop offset="100%" stop-color="var(--solar)" stop-opacity="0"/>
      </radialGradient>
    </defs>

    

    <!-- tight rings hugging the star's outer edge -->
    <g fill="none">
      <circle class="ring-solar" cx="230" cy="200" r="150" stroke-opacity="0.26" stroke-width="1.2" stroke="rgb(255, 117, 21)"/>
      <circle class="ring-purple" cx="230" cy="200" r="166" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3 7" stroke="rgb(155, 135, 214)"/>
      <g class="orbit-dot"><circle cx="380" cy="200" r="3.5" fill="rgb(255, 117, 21)"/></g>
    </g>

