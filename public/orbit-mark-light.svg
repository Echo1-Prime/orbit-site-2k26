      <rect class="sq-white" x="196" y="166" width="68" height="68" transform="rotate(45 230 200)" rx="6" fill="rgb(255, 255, 255)"/>
      <rect class="sq-black" x="207" y="177" width="46" height="46" transform="rotate(45 230 200)" rx="4" fill="rgb(10, 10, 14)"/>
